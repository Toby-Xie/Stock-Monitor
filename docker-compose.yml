services:
  api:
    build: .
    container_name: stock-monitor-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_TO: ${MAIL_TO}
    depends_on:
      db:
        condition: service_healthy
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: stock-monitor-scheduler
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123456@db:5432/stockdb
      TZ: Asia/Shanghai
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_TO: ${MAIL_TO}
      # 供调度器调用 API 的基础地址（使用服务名）
      API_BASE_URL: ${API_BASE_URL}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: stock-monitor-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: